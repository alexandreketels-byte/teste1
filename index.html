<!DOCTYPE html>
<html>
<head>
  <title>Controle de Entregas</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: url('https://stockcake.com/pt/i/warehouse-night-shift_1293991_740496') no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    .container {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 10px;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }

    .card {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      text-align: center;
      font-size: 18px;
    }

    .total { background: #007bff; }
    .pendente { background: #dc3545; }
    .respondido { background: #28a745; }

    /* BOTÕES */
    .filtros {
  margin-top: 10px;
}

.filtros button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-right: 10px;
  transition: all 0.2s ease;
  font-size: 14px;
}

/* CORES */
.btn-todos {
  background: #007bff;
}

.btn-pendente {
  background: #dc3545;
}

.btn-respondido {
  background: #28a745;
}

/* HOVER */
.filtros button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* ATIVO */
.ativo {
  box-shadow: 0 0 0 3px rgba(0,0,0,0.2);
  transform: scale(1.05);
}

    /* TABELA */
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      margin-top: 15px;
      background: white;
    }

    th {
      background: #007bff;
      color: white;
      padding: 8px;
    }

    td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: center;
    }

    select, input {
      width: 100%;
      padding: 4px;
    }

    .verde {
      background-color: #d4edda !important;
    }

    .vermelho {
      background-color: #f8d7da !important;
    }

  </style>
</head>

<body>

<div class="container">

<h2>🚚 Entregas Pendentes</h2>

<!-- BOTÕES -->
<div class="filtros">
  <button class="btn-todos ativo" onclick="filtrar('TODOS', this)">Todos</button>
  <button class="btn-pendente" onclick="filtrar('PENDENTE', this)">Pendentes</button>
  <button class="btn-respondido" onclick="filtrar('RESPONDIDO', this)">Respondidos</button>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card total" id="totalCard">Total: 0</div>
  <div class="card pendente" id="pendenteCard">Pendentes: 0</div>
  <div class="card respondido" id="respondidoCard">Respondidos: 0</div>
</div>

<table id="tabela">
  <thead>
    <tr>
      <th>Pedido</th>
      <th>NF</th>
      <th>Transp</th>
      <th>Cidade</th>
      <th>Coleta</th>
      <th>Previsão</th>
      <th>UF</th>
      <th>Atraso dias</th>
      <th>Status</th>
      <th>Agendado</th>
      <th>Em rota</th>
      <th>Status</th>
      <th>Atraso?</th>
      <th>Motivo</th>
      <th>Data Resp</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwI4rXeSdViPoPqPgrQqDfBt5dbFmfo1oCeP3VPv-K0b7WelVm0xpDcfIl3yNguK5OL/exec";
let filtroAtual = "TODOS";

function formatarData(data) {
  if (!data || isNaN(new Date(data))) return data;
  const d = new Date(data);
  return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
}

function filtrar(tipo, btn) {
  filtroAtual = tipo;

  // remove destaque de todos
  document.querySelectorAll(".filtros button").forEach(b => {
    b.classList.remove("ativo");
  });

  // adiciona no clicado
  btn.classList.add("ativo");

  carregarDados();
}

async function carregarDados() {
  const res = await fetch(API_URL);
  const dados = await res.json();

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  let total = 0, pendentes = 0, respondidos = 0;

  dados.slice(1).forEach(linha => {

    const atrasoAtual = linha[11] || "";
    const motivoAtual = linha[12] || "";
    const dataResposta = linha[13] || "";

    const status = atrasoAtual ? "RESPONDIDO" : "PENDENTE";

    total++;
    if (status === "RESPONDIDO") respondidos++;
    else pendentes++;

    if (filtroAtual === "PENDENTE" && status !== "PENDENTE") return;
    if (filtroAtual === "RESPONDIDO" && status !== "RESPONDIDO") return;

    const tr = document.createElement("tr");
    tr.className = status === "RESPONDIDO" ? "verde" : "vermelho";

    tr.innerHTML = `
      <td>${linha[0]}</td>
      <td>${linha[1]}</td>
      <td>${linha[2]}</td>
      <td>${linha[3]}</td>
      <td>${formatarData(linha[4])}</td>
      <td>${formatarData(linha[5])}</td>
      <td>${linha[6]}</td>
      <td>${linha[7]}</td>
      <td>${linha[8]}</td>
      <td>${linha[9]}</td>
      <td>${formatarData(linha[10])}</td>
      <td>${status}</td>

      <td>
        <select>
          <option value="">-</option>
          <option value="SIM" ${atrasoAtual === "SIM" ? "selected" : ""}>SIM</option>
          <option value="NAO" ${atrasoAtual === "NAO" ? "selected" : ""}>NÃO</option>
        </select>
      </td>

      <td><input value="${motivoAtual}" /></td>

      <td>${formatarData(dataResposta)}</td>

      <td><button onclick="salvar(this)">Salvar</button></td>
    `;

    tbody.appendChild(tr);
  });

  // atualizar cards
  document.getElementById("totalCard").innerText = `Total: ${total}`;
  document.getElementById("pendenteCard").innerText = `Pendentes: ${pendentes}`;
  document.getElementById("respondidoCard").innerText = `Respondidos: ${respondidos}`;
}

async function salvar(btn) {
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  const nf = tds[1].innerText;
  const atraso = tds[12].querySelector("select").value;
  const motivo = tds[13].querySelector("input").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ nf, atraso, motivo })
  });

  alert("Atualizado!");
  carregarDados();
}

carregarDados();

</script>

</body>
</html>
