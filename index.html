<!DOCTYPE html>
<html>
<head>
  <title>Controle de Entregas</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; }
    input, select { width: 100%; }
    button { padding: 5px 10px; }
  </style>
</head>
<body>

<h2>Controle de NFs</h2>

<table id="tabela">
  <thead>
    <tr>
      <th>NF</th>
      <th>Transportadora</th>
      <th>Status</th>
      <th>Atraso</th>
      <th>Motivo</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwI4rXeSdViPoPqPgrQqDfBt5dbFmfo1oCeP3VPv-K0b7WelVm0xpDcfIl3yNguK5OL/exec";

// carregar dados
async function carregarDados() {
  const res = await fetch(API_URL);
  const dados = await res.json();

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  dados.slice(1).forEach(linha => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${linha[0]}</td>
      <td>${linha[1]}</td>
      <td>${linha[2] || ""}</td>
      <td>
        <select>
          <option value="">-</option>
          <option value="SIM">SIM</option>
          <option value="NAO">NÃO</option>
        </select>
      </td>
      <td><input type="text" placeholder="Motivo"></td>
      <td><button onclick="salvar(this)">Salvar</button></td>
    `;

    tbody.appendChild(tr);
  });
}

// salvar alteração
async function salvar(btn) {
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  const nf = tds[0].innerText;
  const transportadora = tds[1].innerText;
  const atraso = tds[3].querySelector("select").value;
  const motivo = tds[4].querySelector("input").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      nf,
      transportadora,
      status: "Atualizado",
      atraso,
      motivo
    })
  });

  alert("Salvo com sucesso!");
}

carregarDados();
</script>

</body>
</html>
