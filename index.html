<!DOCTYPE html>
<html>
<head>
  <title>Controle de Entregas</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: url('https://stockcake.com/pt/i/warehouse-night-shift_1293991_740496') no-repeat center center fixed;
      background-size: cover;
    }

    .container {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 10px;
    }

    /* BOTÕES */
    .filtros button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
      transition: 0.2s;
    }

    .btn-todos { background: #007bff; }
    .btn-pendente { background: #dc3545; }
    .btn-respondido { background: #28a745; }

    .filtros button:hover {
      transform: scale(1.05);
    }

    .ativo {
      box-shadow: 0 0 0 3px rgba(0,0,0,0.2);
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 15px;
      margin: 15px 0;
    }

    .card {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    .total { background: #007bff; }
    .pendente { background: #dc3545; }
    .respondido { background: #28a745; }

    /* TABELA */
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 15px;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    th {
      background: #007bff;
      color: white;
      padding: 10px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #e0e0e0;
      text-align: center;
    }

    td + td {
      border-left: 1px solid #f0f0f0;
    }

    tr:nth-child(even) {
      background-color: #f8f9fa;
    }

    tr:hover {
      background-color: #e9f3ff;
    }

    /* STATUS */
    .status-respondido {
      background: #28a745;
      color: white;
      font-weight: bold;
    }

    .status-pendente {
      background: #dc3545;
      color: white;
      font-weight: bold;
    }

    select, input {
      width: 100%;
    }

  </style>
</head>

<body>

<div class="container">

<h2>🚚 Entregas Pendentes</h2>

<div class="filtros">
  <button class="btn-todos ativo" onclick="filtrar('TODOS', this)">Todos</button>
  <button class="btn-pendente" onclick="filtrar('PENDENTE', this)">Pendentes</button>
  <button class="btn-respondido" onclick="filtrar('RESPONDIDO', this)">Respondidos</button>
</div>

<div class="cards">
  <div class="card total" id="totalCard">Total: 0</div>
  <div class="card pendente" id="pendenteCard">Pendentes: 0</div>
  <div class="card respondido" id="respondidoCard">Respondidos: 0</div>
</div>

<table id="tabela">
  <thead>
    <tr>
      <th>Pedido</th>
      <th>NF</th>
      <th>Transp</th>
      <th>Cidade</th>
      <th>Coleta</th>
      <th>Previsão</th>
      <th>UF</th>
      <th>Atraso dias</th>
      <th>Status</th>
      <th>Agendado</th>
      <th>Em rota</th>
      <th>Status Resp</th>
      <th>Atraso?</th>
      <th>Motivo</th>
      <th>Data Resp</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script>

const API_URL = "SUA_URL_AQUI";
let filtroAtual = "TODOS";

function formatarData(data) {
  if (!data || isNaN(new Date(data))) return data;
  const d = new Date(data);
  return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
}

function filtrar(tipo, btn) {
  filtroAtual = tipo;

  document.querySelectorAll(".filtros button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");

  carregarDados();
}

async function carregarDados() {
  const res = await fetch(API_URL);
  const dados = await res.json();

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  let total = 0, pendentes = 0, respondidos = 0;

  dados.slice(1).forEach(linha => {

    const atrasoAtual = linha[11] || "";
    const motivoAtual = linha[12] || "";
    const dataResposta = linha[13] || "";

    const status = atrasoAtual ? "RESPONDIDO" : "PENDENTE";

    total++;
    if (status === "RESPONDIDO") respondidos++;
    else pendentes++;

    if (filtroAtual === "PENDENTE" && status !== "PENDENTE") return;
    if (filtroAtual === "RESPONDIDO" && status !== "RESPONDIDO") return;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${linha[0]}</td>
      <td>${linha[1]}</td>
      <td>${linha[2]}</td>
      <td>${linha[3]}</td>
      <td>${formatarData(linha[4])}</td>
      <td>${formatarData(linha[5])}</td>
      <td>${linha[6]}</td>
      <td>${linha[7]}</td>
      <td>${linha[8]}</td>
      <td>${linha[9]}</td>
      <td>${formatarData(linha[10])}</td>

      <td class="${status === 'RESPONDIDO' ? 'status-respondido' : 'status-pendente'}">
        ${status}
      </td>

      <td>
        <select>
          <option value="">-</option>
          <option value="SIM" ${atrasoAtual === "SIM" ? "selected" : ""}>SIM</option>
          <option value="NAO" ${atrasoAtual === "NAO" ? "selected" : ""}>NÃO</option>
        </select>
      </td>

      <td><input value="${motivoAtual}" /></td>

      <td>${formatarData(dataResposta)}</td>

      <td><button onclick="salvar(this)">Salvar</button></td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("totalCard").innerText = `Total: ${total}`;
  document.getElementById("pendenteCard").innerText = `Pendentes: ${pendentes}`;
  document.getElementById("respondidoCard").innerText = `Respondidos: ${respondidos}`;
}

async function salvar(btn) {
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  const nf = tds[1].innerText;
  const atraso = tds[12].querySelector("select").value;
  const motivo = tds[13].querySelector("input").value;

  if (!atraso) {
    alert("Selecione SIM ou NÃO");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ nf, atraso, motivo })
  });

  alert("Atualizado!");
  carregarDados();
}

carregarDados();

</script>

</body>
</html>
