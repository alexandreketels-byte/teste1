<!DOCTYPE html>
<html>
<head>
  <title>Controle de Entregas</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    h2 { margin-bottom: 20px; }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: center;
    }

    select, input {
      width: 100%;
      font-size: 12px;
    }

    button {
      padding: 5px;
      cursor: pointer;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
  </style>
</head>

<body>

<h2>Controle de NFs - Transportadora</h2>

<table id="tabela">
  <thead>
    <tr>
      <th>Pedido</th>
      <th>NF</th>
      <th>Transp</th>
      <th>Cidade</th>
      <th>Coleta</th>
      <th>Previsão</th>
      <th>UF</th>
      <th>Atraso dias</th>
      <th>Status</th>
      <th>Agendado</th>
      <th>Em rota</th>
      <th>Status Resp</th>
      <th>Atraso?</th>
      <th>Motivo</th>
      <th>Data Resp</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwI4rXeSdViPoPqPgrQqDfBt5dbFmfo1oCeP3VPv-K0b7WelVm0xpDcfIl3yNguK5OL/exec";

// formatar data padrão BR
function formatarData(data) {
  if (!data) return "";

  const d = new Date(data);

  const dia = String(d.getUTCDate()).padStart(2, '0');
  const mes = String(d.getUTCMonth() + 1).padStart(2, '0');
  const ano = d.getUTCFullYear();

  return `${dia}/${mes}/${ano}`;
}
// carregar dados
async function carregarDados() {
  const res = await fetch(API_URL);
  const dados = await res.json();

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  dados.slice(1).forEach(linha => {

    const atrasoAtual = linha[11] || "";
    const motivoAtual = linha[12] || "";
    const dataResposta = linha[13] || "";

    const respondido = atrasoAtual ? "✔ Respondido" : "⏳ Pendente";

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${linha[0]}</td>
      <td>${linha[1]}</td>
      <td>${linha[2]}</td>
      <td>${linha[3]}</td>
      <td>${formatarData(linha[4])}</td>
      <td>${formatarData(linha[5])}</td>
      <td>${linha[6]}</td>
      <td>${linha[7]}</td>
      <td>${linha[8]}</td>
      <td>${linha[9]}</td>
      <td>${linha[10]}</td>

      <td>${respondido}</td>

      <td>
        <select>
          <option value="">-</option>
          <option value="SIM" ${atrasoAtual === "SIM" ? "selected" : ""}>SIM</option>
          <option value="NAO" ${atrasoAtual === "NAO" ? "selected" : ""}>NÃO</option>
        </select>
      </td>

      <td>
        <input type="text" value="${motivoAtual}" placeholder="Motivo">
      </td>

      <td>${formatarData(dataResposta)}</td>

      <td>
        <button onclick="salvar(this)">Salvar</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// salvar
async function salvar(btn) {
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  const nf = tds[1].innerText;
  const atraso = tds[12].querySelector("select").value;
  const motivo = tds[13].querySelector("input").value;

  if (!atraso) {
    alert("Selecione SIM ou NÃO");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      nf,
      atraso,
      motivo
    })
  });

  alert("Atualizado com sucesso!");
  carregarDados(); // atualiza tabela após salvar
}

// iniciar
carregarDados();

</script>

</body>
</html>
