<!DOCTYPE html>
<html>
<head>
  <title>Controle de Entregas</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: url('https://wallpapers.com/images/high/black-and-gray-4s2myomvmr73vzej.webp') no-repeat center center fixed;
      background-size: cover;
    }

    .container {
      background: rgba(255,255,255,0.92);
      padding: 20px;
      border-radius: 12px;
    }

    .filtros button {
      padding: 10px;
      margin-right: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-todos { background: #007bff; }
    .btn-pendente { background: #dc3545; }
    .btn-respondido { background: #28a745; }

    .ativo { box-shadow: 0 0 0 3px rgba(0,0,0,0.2); }

    .cards {
      display: flex;
      gap: 10px;
      margin: 15px 0;
    }

    .card {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      color: white;
      text-align: center;
      font-weight: bold;
    }

    .total { background: #007bff; }
    .pendente { background: #dc3545; }
    .respondido { background: #28a745; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th {
      background: #007bff;
      color: white;
      padding: 8px;
    }

    td {
      padding: 6px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    tr:hover {
      background: #eef6ff;
    }

    .status-respondido {
      background: #28a745;
      color: white;
    }

    .status-pendente {
      background: #dc3545;
      color: white;
    }

    button {
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .btn-lote {
      background: orange;
      color: white;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="container">

<h2>🚚 Controle de Entregas</h2>

<div class="filtros">
  <button class="btn-todos ativo" onclick="filtrar('TODOS', this)">Todos</button>
  <button class="btn-pendente" onclick="filtrar('PENDENTE', this)">Pendentes</button>
  <button class="btn-respondido" onclick="filtrar('RESPONDIDO', this)">Respondidos</button>
</div>

<div class="cards">
  <div class="card total" id="totalCard">Total: 0</div>
  <div class="card pendente" id="pendenteCard">Pendentes: 0</div>
  <div class="card respondido" id="respondidoCard">Respondidos: 0</div>
</div>

<button class="btn-lote" onclick="salvarSelecionados()" id="btnLote">💾 Salvar Selecionados</button>

<table id="tabela">
<thead>
<tr>
<th><input type="checkbox" onclick="selecionarTodos(this)"></th>
<th>Pedido</th>
<th>NF</th>
<th>Transp</th>
<th>Cidade</th>
<th>Coleta</th>
<th>Previsão</th>
<th>UF</th>
<th>Atraso dias</th>
<th>Status</th>
<th>Agendado</th>
<th>Em rota</th>
<th>Status Resp</th>
<th>Atraso?</th>
<th>Motivo</th>
<th>Data Resp</th>
<th>Ação</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwI4rXeSdViPoPqPgrQqDfBt5dbFmfo1oCeP3VPv-K0b7WelVm0xpDcfIl3yNguK5OL/exec";

const params = new URLSearchParams(window.location.search);
const modo = params.get("modo") || "view";

if (modo === "edit") {
  const senha = prompt("gfw123");
  if (senha !== "1234") {
    document.body.innerHTML = "Acesso negado";
  }
}

if (modo === "view") {
  window.onload = () => {
    document.getElementById("btnLote").style.display = "none";
  }
}

let filtroAtual = "TODOS";

function formatarData(data) {
  if (!data || isNaN(new Date(data))) return data;
  const d = new Date(data);
  return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
}

function filtrar(tipo, btn) {
  filtroAtual = tipo;
  document.querySelectorAll(".filtros button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  carregarDados();
}

function selecionarTodos(master) {
  document.querySelectorAll(".checkLinha").forEach(c => c.checked = master.checked);
}

async function carregarDados() {

  const res = await fetch(API_URL);
  const dados = await res.json();

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  let total = 0, pendentes = 0, respondidos = 0;

  dados.slice(1).forEach(linha => {

    const atrasoAtual = linha[11] || "";
    const motivoAtual = linha[12] || "";
    const dataResposta = linha[13] || "";

    const status = atrasoAtual ? "RESPONDIDO" : "PENDENTE";

    total++;
    if (status === "RESPONDIDO") respondidos++;
    else pendentes++;

    if (filtroAtual === "PENDENTE" && status !== "PENDENTE") return;
    if (filtroAtual === "RESPONDIDO" && status !== "RESPONDIDO") return;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input type="checkbox" class="checkLinha"></td>
      <td>${linha[0]}</td>
      <td>${linha[1]}</td>
      <td>${linha[2]}</td>
      <td>${linha[3]}</td>
      <td>${formatarData(linha[4])}</td>
      <td>${formatarData(linha[5])}</td>
      <td>${linha[6]}</td>
      <td>${linha[7]}</td>
      <td>${linha[8]}</td>
      <td>${linha[9]}</td>
      <td>${formatarData(linha[10])}</td>

      <td class="${status === 'RESPONDIDO' ? 'status-respondido' : 'status-pendente'}">
        ${status}
      </td>

      <td>
        <select ${modo === "view" ? "disabled" : ""}>
          <option value="">-</option>
          <option value="SIM" ${atrasoAtual === "SIM" ? "selected" : ""}>SIM</option>
          <option value="NAO" ${atrasoAtual === "NAO" ? "selected" : ""}>NÃO</option>
        </select>
      </td>

      <td>
        <input value="${motivoAtual}" ${modo === "view" ? "disabled" : ""}/>
      </td>

      <td>${formatarData(dataResposta)}</td>

      <td>
        ${modo === "view" ? "-" : '<button onclick="salvar(this)">Salvar</button>'}
      </td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("totalCard").innerText = `Total: ${total}`;
  document.getElementById("pendenteCard").innerText = `Pendentes: ${pendentes}`;
  document.getElementById("respondidoCard").innerText = `Respondidos: ${respondidos}`;
}

async function salvar(btn) {
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  const nf = tds[2].innerText;
  const atraso = tds[13].querySelector("select").value;
  const motivo = tds[14].querySelector("input").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ nf, atraso, motivo })
  });

  alert("Atualizado!");
  carregarDados();
}

async function salvarSelecionados() {

  const linhas = document.querySelectorAll("#tabela tbody tr");
  const lote = [];

  linhas.forEach(tr => {
    const check = tr.querySelector(".checkLinha");

    if (check && check.checked) {
      const tds = tr.querySelectorAll("td");

      const nf = tds[2].innerText;
      const atraso = tds[13].querySelector("select").value;
      const motivo = tds[14].querySelector("input").value;

      if (atraso) {
        lote.push({ nf, atraso, motivo });
      }
    }
  });

  if (lote.length === 0) {
    alert("Selecione pelo menos uma linha!");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ lote })
  });

  alert("Lote atualizado!");
  carregarDados();
}

carregarDados();

</script>

</body>
</html>
