<!DOCTYPE html>
<html>
<head>
  <title>Controle de Entregas</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; font-size: 14px; }
    input, select { width: 100%; }
    button { padding: 5px 10px; cursor: pointer; }
    h2 { margin-bottom: 20px; }
  </style>
</head>
<body>

<h2>Controle de NFs - Transportadora</h2>

<table id="tabela">
  <thead>
    <tr>
      <th>Pedido</th>
      <th>NF</th>
      <th>Transportadora</th>
      <th>Cidade</th>
      <th>Status</th>
      <th>Atraso</th>
      <th>Motivo</th>
      <th>Ação</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwEmWMMQAd-Sm4dlu1gFzkp-TThPSNCDkIepdLm4MM8OGeK5MXeCzZe6Mf_Wec9LE6o/exec";

// carregar dados
async function carregarDados() {
  const res = await fetch(API_URL);
  const dados = await res.json();

  const tbody = document.querySelector("#tabela tbody");
  tbody.innerHTML = "";

  dados.slice(1).forEach(linha => {

    const tr = document.createElement("tr");

    const atrasoAtual = linha[11] || "";
    const motivoAtual = linha[12] || "";

    tr.innerHTML = `
      <td>${linha[0]}</td>
      <td>${linha[1]}</td>
      <td>${linha[2]}</td>
      <td>${linha[3]}</td>
      <td>${linha[8]}</td>

      <td>
        <select>
          <option value="">-</option>
          <option value="SIM" ${atrasoAtual === "SIM" ? "selected" : ""}>SIM</option>
          <option value="NAO" ${atrasoAtual === "NAO" ? "selected" : ""}>NÃO</option>
        </select>
      </td>

      <td>
        <input type="text" value="${motivoAtual}" placeholder="Motivo">
      </td>

      <td>
        <button onclick="salvar(this)">Salvar</button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

// salvar alteração
async function salvar(btn) {
  const tr = btn.parentElement.parentElement;
  const tds = tr.querySelectorAll("td");

  const nf = tds[1].innerText;
  const atraso = tds[5].querySelector("select").value;
  const motivo = tds[6].querySelector("input").value;

  if (!atraso) {
    alert("Selecione SIM ou NÃO para atraso");
    return;
  }

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      nf,
      atraso,
      motivo
    })
  });

  alert("Atualizado com sucesso!");
}

carregarDados();
</script>

</body>
</html>
